# Pre-commit hooks - run automatically before each git commit.
#
# Install once:
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#
# Run manually on all files:
#   pre-commit run --all-files
#
# Auto-update hook versions:
#   pre-commit autoupdate

default_language_version:
  python: python3.11

default_stages: [pre-commit]

repos:
# ─── GENERIC: WHITESPACE, EOL, LARGE FILES, MERGE CONFLICTS, SECRETS ──────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.md$  # markdown trailing spaces are line breaks
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: ^.*\.ipynb$  # notebooks have their own JSON quirks
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

# ─── SECRET SCANNING ──────────────────────────────────────────────────────────
# Catches AWS keys, API tokens, private keys.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

# ─── PYTHON: RUFF (LINT + FORMAT), MYPY (TYPES) ───────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-requests
          - types-tqdm
          - boto3-stubs[s3,ssm,emr]
        args: [--config-file=pyproject.toml]
        files: ^(src|scripts)/.*\.py$

# ─── TERRAFORM: FMT, VALIDATE, TFLINT, TRIVY ──────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --hook-config=--retry-once-with-cleanup=true
          - --tf-init-args=-backend=false
      - id: terraform_tflint
        args:
          - --args=--recursive
      - id: terraform_checkov
        args:
          - --args=--quiet --soft-fail

# ─── SHELL SCRIPTS: SHELLCHECK ────────────────────────────────────────────────
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [--severity=warning]

# ─── MARKDOWN ─────────────────────────────────────────────────────────────────
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.yaml, --ignore, node_modules, --fix]

# ─── DOCKERFILE ───────────────────────────────────────────────────────────────
  - repo: https://github.com/hadolint/hadolint
    rev: v2.13.1-beta
    hooks:
      - id: hadolint-docker
        args: [--ignore, DL3008, --ignore, DL3009]
        # DL3008: pin apt versions (often impractical for base images)
        # DL3009: delete apt lists after install (handled in our Dockerfile)

# ─── COMMIT MESSAGE: CONVENTIONAL COMMITS ───────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, style, refactor, perf, test, chore, ci, build, revert]

# ─── NOTEBOOK HYGIENE ─────────────────────────────────────────────────────────
# Strip outputs before commit.
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout

# ─── LOCAL: LANGUAGE HYGIENE ──────────────────────────────────────────────────
# Block PT-BR from leaking into public files.
  - repo: local
    hooks:
      - id: check-no-pt-br
        name: No PT-BR in repo-public files
        entry: python scripts/check_no_pt_br.py
        language: system
        pass_filenames: true
        types_or: [python, terraform, shell, markdown, yaml, toml, dockerfile]
