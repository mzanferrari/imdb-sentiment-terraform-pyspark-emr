# Development container compose file.
#
# Mounts:
#   - The repo (read-write) so host edits reflect inside the container
#   - A named volume over .venv so the container's virtualenv never collides
#     with or overwrites the host's .venv (they are built for different paths)
#   - The host's ~/.aws (read-only) so the container uses your credentials
#     without baking them into the image
#   - The host's ~/.gitconfig (read-only) so commits are attributed correctly

services:
  mz-p2:
    build:
      context: .
      dockerfile: Dockerfile
    image: imdb-sentiment-dev:local
    container_name: mz-p2-dev
    volumes:
      - .:/workspace:rw
      - venv-data:/workspace/.venv
      - ${HOME}/.aws:/home/developer/.aws:ro
      - ${HOME}/.gitconfig:/home/developer/.gitconfig:ro
    working_dir: /workspace
    environment:
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-west-1}
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    command: /bin/bash

volumes:
  venv-data:
