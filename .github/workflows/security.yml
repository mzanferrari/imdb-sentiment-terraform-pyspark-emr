name: Security (scheduled + on-demand)

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday at 06:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "requirements.txt"
      - ".github/workflows/security.yml"

permissions:
  contents: read
  security-events: write   # Upload SARIF to the Security tab

jobs:
  # ===================================================================
  # Dependency vulnerabilities (Python)
  # ===================================================================
  python-deps:
    name: Python dependency scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.11

      - name: Install deps
        run: uv sync --all-extras

      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          uv run pip-audit --strict || echo "Vulnerabilities found - see logs"

  # ===================================================================
  # Container image scan (Trivy)
  # ===================================================================
  container-scan:
    name: Container image scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t mz-p2:scan -f Dockerfile .

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mz-p2:scan
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          # Non-blocking: this is a dev image, not a production artifact
          # (ADR-0006). Remaining HIGH CVEs are in third-party tooling
          # (terraform, tflint, vendored setuptools libs) awaiting upstream
          # rebuilds. The scan still runs and uploads to the Security tab for
          # visibility; it is reviewed periodically, not used to block merge.
          exit-code: "0"
          ignore-unfixed: true

      - name: Upload Trivy results to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ===================================================================
  # Filesystem scan (catches secrets and misconfigurations in IaC)
  # ===================================================================
  fs-scan:
    name: Filesystem & IaC scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy fs scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy fs results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

  # ===================================================================
  # Bandit - Python SAST (Static Application Security Testing)
  # ===================================================================
  python-sast:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit
        run: bandit -r src/ scripts/ -ll
