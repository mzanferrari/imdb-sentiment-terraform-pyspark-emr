name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel older runs on the same PR/branch when a new commit arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read       # Minimal default
  pull-requests: write # To post results on PRs

jobs:
# ─── PYTHON: LINT, FORMAT CHECK, TYPE CHECK, TESTS ────────────────────────────
  python:
    name: Python (ruff + mypy + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src/ tests/ scripts/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/ scripts/

      - name: Mypy type check
        run: uv run mypy src/ scripts/

      - name: Language hygiene (no PT-BR in public files)
        run: uv run python scripts/check_no_pt_br.py

      - name: Pytest
        run: uv run pytest -v --cov=src/pipeline --cov-report=xml

      - name: Upload coverage to Codecov (optional)
        if: success()
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

# ─── TERRAFORM: FORMAT, VALIDATE ──────────────────────────────────────────────
  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        stack: [bootstrap, data-platform]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.5"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive infra/

      - name: Terraform init (no backend)
        working-directory: infra/${{ matrix.stack }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/${{ matrix.stack }}
        run: terraform validate

# ─── IAC SECURITY: TFLINT + TRIVY ─────────────────────────────────────────────
  iac-security:
    name: IaC security (tflint + trivy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint init
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: tflint run
        run: tflint --recursive --chdir=infra/

      - name: Trivy IaC scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: infra/
          trivyignores: infra/.trivyignore
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

# ─── SECRET SCANNING ──────────────────────────────────────────────────────────
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history for diff scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ─── MARKDOWN LINTING ─────────────────────────────────────────────────────────
# Catches broken links and bad formatting in docs.
  docs:
    name: Markdown lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules/**
            !.terraform/**
            !data/**

# ─── AGGREGATE STATUS ─────────────────────────────────────────────────────────
# Single required check, useful for branch protection rules.
  ci-success:
    name: CI Success
    needs: [python, terraform, iac-security, secrets, docs]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || \
                "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All checks passed."
